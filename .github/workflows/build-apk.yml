name: Build APK — CannaGuia

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer + Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Instalar Buildozer e Cython
        run: |
          pip3 install --upgrade buildozer cython

      - name: Aceitar licenças Android SDK
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | buildozer android update 2>/dev/null || true

      - name: Build APK (debug)
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CannaGuia-debug-apk
          path: bin/*.apk
          retention-days: 30
